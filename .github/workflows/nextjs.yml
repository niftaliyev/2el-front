name: Deploy 2el-front

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            PROJECT_DIR=/var/www/2el-front

            # Удаляем старый проект и создаем чистую папку
            rm -rf $PROJECT_DIR
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # Клонируем репозиторий
            git clone https://github.com/${{ github.repository }} . || exit 1

            # Проверка наличия package.json
            if [ ! -f package.json ]; then
              echo "package.json не найден! Деплой прерван."
              exit 1
            fi

            # Загружаем NVM и используем Node 20
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20

            # Установка зависимостей и билд
            npm install --production
            npm run build

            # Перезапуск через PM2
            pm2 describe 2el-front > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload 2el-front
            else
              pm2 start npm --name "2el-front" -- start
            fi
            pm2 save
