name: Deploy 2el-front

on:
  push:
    branches:
      - main  # или ваша ветка для деплоя

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}        # 34.118.4.211
          username: ${{ secrets.SERVER_USER }}    # ilhambehruz
          key: ${{ secrets.SERVER_SSH_KEY }}      # приватный ключ
          port: ${{ secrets.SERVER_SSH_PORT }}    # 22
          script: |
            cd /var/www/2el-front

            # Загружаем NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            # Проверка версий
            echo "Node version: $(node -v)"
            echo "NPM version: $(npm -v)"
            echo "PM2 version: $(pm2 -v)"

            # Установка зависимостей и сборка
            npm install --production
            npm run build

            # Перезапуск через PM2
            if pm2 describe 2el-front > /dev/null; then
              pm2 reload 2el-front
            else
              pm2 start npm --name "2el-front" -- start
            fi
            pm2 save
