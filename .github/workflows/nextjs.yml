name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репо
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js локально для Actions (не обязательно, если билдим на сервере)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Копируем файлы на сервер
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: ${{ env.APP_DIR }}

      # 4. Деплой и рестарт на сервере
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}

            # Абсолютные пути к Node, npm и PM2
            NODE_BIN="$HOME/.nvm/versions/node/v20.20.2/bin/node"
            NPM_BIN="$HOME/.nvm/versions/node/v20.20.2/bin/npm"
            PM2_BIN="$HOME/.nvm/versions/node/v20.20.2/bin/pm2"

            # Устанавливаем зависимости и билдим
            $NPM_BIN install --production
            $NPM_BIN run build

            # Проверяем PM2 и перезапускаем приложение
            $PM2_BIN describe ${{ env.APP_NAME }} > /dev/null
            if [ $? -eq 0 ]; then
              $PM2_BIN reload ${{ env.APP_NAME }}
            else
              $PM2_BIN start $NPM_BIN --name "${{ env.APP_NAME }}" -- start
            fi

            $PM2_BIN save
