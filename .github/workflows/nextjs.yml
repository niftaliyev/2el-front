name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Upload code to VPS
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: ${{ env.APP_DIR }}

      # 3. Install, build и запуск через PM2 на VPS
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}

            # Загружаем nvm
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh

            # Используем Node.js 20
            nvm install 20
            nvm use 20

            # Устанавливаем зависимости и билдим
            npm install --production
            npm run build

            # Запуск через PM2
            pm2 describe ${{ env.APP_NAME }} > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload ${{ env.APP_NAME }}
            else
              pm2 start npm --name "${{ env.APP_NAME }}" -- start
            fi

            pm2 save
