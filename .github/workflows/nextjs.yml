name: Deploy Frontend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Подключаемся к VPS по SSH и билдим/перезапускаем контейнер
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/2el-front || mkdir -p /home/${{ secrets.SERVER_USER }}/2el-front && cd /home/${{ secrets.SERVER_USER }}/2el-front

            # Если есть старый контейнер — удалить
            docker stop 2el-front || true
            docker rm 2el-front || true

            # Скачиваем свежий код
            git reset --hard
            git pull origin main

            # Собираем образ и запускаем контейнер
            docker build -t 2el-front:latest .
            docker run -d -p 3000:3000 --name 2el-front 2el-front:latest
