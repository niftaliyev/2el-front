name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Создаём папку и выставляем права перед копированием
      - name: Prepare server folder
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p ${{ env.APP_DIR }}
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} ${{ env.APP_DIR }}
            sudo chmod -R 755 ${{ env.APP_DIR }}

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: ${{ env.APP_DIR }}
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            export PATH=$HOME/.nvm/versions/node/v20.20.2/bin:$PATH
            npm install --production
            npm run build
            pm2 describe ${{ env.APP_NAME }} > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload ${{ env.APP_NAME }}
            else
              pm2 start npm --name "${{ env.APP_NAME }}" -- start
            fi
            pm2 save
