name: Deploy 2el-front

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            PROJECT_DIR=/var/www/2el-front
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # Проверка прав
            if [ ! -w $PROJECT_DIR ]; then
              echo "Нет прав на запись в $PROJECT_DIR"
              exit 1
            fi

            # Если пустая папка, клонируем через HTTPS с токеном
            if [ -z "$(ls -A $PROJECT_DIR)" ]; then
              git clone https://$GH_TOKEN@github.com/niftaliyev/2el-front.git .
            else
              git reset --hard
              git pull origin main
            fi

            # Проверка package.json
            if [ ! -f package.json ]; then
              echo "package.json не найден! Деплой прерван."
              exit 1
            fi

            # Node через NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20

            npm install --production
            npm run build

            pm2 describe 2el-front > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload 2el-front
            else
              pm2 start npm --name "2el-front" -- start
            fi
            pm2 save
