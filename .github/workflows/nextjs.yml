name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репо
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Установка зависимостей
      - name: Install dependencies
        run: npm ci

      # 4. Билд Next.js
      - name: Build Next.js app
        run: npm run build

      # 5. Копируем на сервер
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: ${{ env.APP_DIR }}

      # 6. Запуск на сервере
      - name: Restart app on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}

            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 18

            npm install --production
            npm run build

            pm2 describe ${{ env.APP_NAME }} > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload ${{ env.APP_NAME }}
            else
              pm2 start npm --name "${{ env.APP_NAME }}" -- start
            fi

            pm2 save
