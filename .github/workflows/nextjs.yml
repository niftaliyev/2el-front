name: Deploy 2el-Front Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Папка проекта
            mkdir -p /var/www/2el-front
            cd /var/www/2el-front

            # Если контейнер уже есть — останавливаем и удаляем
            docker stop 2el-front || true
            docker rm 2el-front || true

            # Сбрасываем старый код или клонируем репозиторий
            if [ -d ".git" ]; then
              git reset --hard
              git pull origin main
            else
              git clone git@github.com:niftaliyev/2el-front.git .
            fi

            # Собираем Docker образ и запускаем контейнер
            docker build -t 2el-front:latest .
            docker run -d -p 3000:3000 --name 2el-front 2el-front:latest
