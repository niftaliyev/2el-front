name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Подготовка папки на сервере
      - name: Prepare server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/2el-front
            sudo chown -R $USER:$USER /var/www/2el-front
            sudo chmod -R 755 /var/www/2el-front

      # 3. Копируем файлы на сервер
      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/var/www/2el-front"
          strip_components: 1

      # 4. Установка и запуск приложения
      - name: Deploy app
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/2el-front

            echo "Node version:"
            node -v || echo "Node not found"

            echo "NPM version:"
            npm -v || echo "NPM not found"

            # Установка зависимостей
            npm install --production

            # Билд Next.js
            npm run build

            # Запуск через PM2
            pm2 describe 2el-front > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload 2el-front
            else
              pm2 start npm --name "2el-front" -- start
            fi

            pm2 save
