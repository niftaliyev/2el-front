name: Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to server via SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
              if [ ! -d "/root/2el-front/.git" ]; then
                echo "Repo not found. Cloning..."
                cd /root
                git clone https://github.com/niftaliyev/2el-front.git
              fi
            
              cd /root/2el-front
            
              echo "Pull latest code..."
              git pull origin main
            
              echo "Rebuild docker..."
              docker compose down || true
              docker compose build --no-cache
              docker compose up -d
            
              echo "Done!"
