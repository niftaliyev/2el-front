name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /home/ilhambehruz/2el-front  # домашняя папка пользователя

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Настраиваем Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Устанавливаем зависимости
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Билдим Next.js
      - name: Build Next.js app
        run: npm run build

      # 5️⃣ Копируем файлы на сервер через SCP
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: ${{ env.APP_DIR }}
          strip_components: 1   # чтобы копировать содержимое репо, а не папку целиком

      # 6️⃣ Запускаем приложение на сервере через PM2
      - name: Restart app on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}

            # Используем Node 20 через NVM
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 20

            # Устанавливаем зависимости и билдим
            npm install --production
            npm run build

            # Проверяем, есть ли уже процесс PM2
            pm2 describe ${{ env.APP_NAME }} > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload ${{ env.APP_NAME }}
            else
              pm2 start npm --name "${{ env.APP_NAME }}" -- start
            fi

            pm2 save
