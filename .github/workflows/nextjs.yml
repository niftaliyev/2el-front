name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репо
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js локально для Actions (не обязательно, если билдим на сервере)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Копируем файлы на сервер
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: ${{ env.APP_DIR }}

      # 4. Деплой и рестарт на сервере
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}

            # Добавляем Node и PM2 в PATH
            export PATH=$HOME/.nvm/versions/node/v20.20.2/bin:$PATH

            # Устанавливаем зависимости и билдим
            npm install --production
            npm run build

            # Проверяем PM2 и перезапускаем приложение
            pm2 describe ${{ env.APP_NAME }} > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload ${{ env.APP_NAME }}
            else
              pm2 start npm --name "${{ env.APP_NAME }}" -- start
            fi
            pm2 save
