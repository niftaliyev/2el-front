name: Deploy 2el-Front

on:
  push:
    branches:
      - main  # Ветка для деплоя

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            PROJECT_DIR=/var/www/2el-front
            echo "📂 Создаём папку проекта если не существует"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            echo "🧹 Чистим старые файлы"
            sudo rm -rf $PROJECT_DIR/*

            echo "📥 Копируем файлы с Actions"
            # Копируем весь код из workspace Actions на сервер
            rsync -avz --exclude='.git' /github/workspace/ $PROJECT_DIR/

            echo "🔧 Загружаем NVM"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            export PATH="$HOME/.nvm/versions/node/v20.20.2/bin:$PATH"

            echo "📦 Установка зависимостей и сборка"
            npm install --production
            npm run build

            echo "🚀 Перезапуск через PM2"
            pm2 describe 2el-front > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 reload 2el-front
            else
              pm2 start npm --name "2el-front" -- start
            fi
            pm2 save

            echo "✅ Деплой завершён"
