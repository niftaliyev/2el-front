name: Deploy 2el-front via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.7.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            PROJECT_DIR=/var/www/2el-front
            sudo rm -rf $PROJECT_DIR/*
            sudo mkdir -p $PROJECT_DIR
            sudo chown -R $USER:$USER $PROJECT_DIR
            git clone git@github.com:niftaliyev/2el-front.git $PROJECT_DIR
            cd $PROJECT_DIR
            npm install --production
            npm run build
            pm2 describe 2el-front > /dev/null && pm2 reload 2el-front || pm2 start npm --name "2el-front" -- start
            pm2 save
