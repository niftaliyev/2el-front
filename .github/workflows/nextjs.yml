name: Deploy 2el-front

on:
  push:
    branches:
      - main  # Деплой только при пуше в main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем репозиторий в runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Node.js через setup-node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Шаг 3: Деплой на сервер
      - name: Deploy to server
        run: |
          # Папка на сервере
          PROJECT_DIR=/var/www/2el-front
          
          # Удаляем старое содержимое
          sudo rm -rf $PROJECT_DIR/*
          sudo mkdir -p $PROJECT_DIR
          sudo chown -R $USER:$USER $PROJECT_DIR

          # Клонируем репозиторий через HTTPS с токеном
          git clone https://$GH_TOKEN@github.com/niftaliyev/2el-front.git $PROJECT_DIR
          
          cd $PROJECT_DIR

          # Устанавливаем зависимости и билдим
          npm install --production
          npm run build

          # Перезапуск через PM2
          pm2 describe 2el-front > /dev/null
          if [ $? -eq 0 ]; then
            pm2 reload 2el-front
          else
            pm2 start npm --name "2el-front" -- start
          fi
          pm2 save
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
