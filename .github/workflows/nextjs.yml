name: Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "Checking repo..."

            if [ ! -d "/root/2el-front/.git" ]; then
              echo "Cloning repo..."
              rm -rf /root/2el-front

              cd /root
              git clone git@github.com:niftaliyev/2el-front.git
            fi

            cd /root/2el-front

            echo "Resetting repo state..."
            git fetch origin
            git reset --hard origin/main

            echo "Building docker..."
            docker compose down || true
            docker compose build --no-cache
            docker compose up -d

            echo "Done!"
