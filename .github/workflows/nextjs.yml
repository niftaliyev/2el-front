name: Docker CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/root/2el-front"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /root/2el-front

            # Remove deleted admin files and folders to prevent stale build context
            rm -rf app/admin
            rm -rf components/features/admin
            rm -f types/admin.ts
            rm -f lib/adminData.ts
            rm -f services/admin.service.ts

            echo "Building docker..."
            docker compose down || true
            docker compose build --no-cache
            docker compose up -d

            echo "Done!"
