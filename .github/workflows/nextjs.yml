name: Deploy 2el-front

on:
  push:
    branches:
      - main   # или ваша ветка для деплоя

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /var/www/2el-front

            # Добавляем Node и PM2 в PATH
            export PATH="/home/ilhambehruz/.nvm/versions/node/v20.20.2/bin:$PATH"

            # Проверка версий
            echo "Node version: $(/home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/node -v)"
            echo "NPM version: $(/home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/npm -v)"
            echo "PM2 version: $(/home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/pm2 -v)"

            # Установка зависимостей и сборка проекта
            /home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/npm install --production
            /home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/npm run build

            # Перезапуск приложения через PM2
            /home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/pm2 describe 2el-front > /dev/null
            if [ $? -eq 0 ]; then
              /home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/pm2 reload 2el-front
            else
              /home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/pm2 start npm --name "2el-front" -- start
            fi
            /home/ilhambehruz/.nvm/versions/node/v20.20.2/bin/pm2 save
