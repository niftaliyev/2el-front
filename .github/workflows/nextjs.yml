name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p $APP_DIR
            sudo chown -R $USER:$USER $APP_DIR
            sudo chmod -R 755 $APP_DIR

      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "${{ env.APP_DIR }}"
          strip_components: 1

      - name: Deploy app
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd $APP_DIR

            # Подключаем NVM (ВАЖНО!)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Используем Node 20
            nvm use 20

            # Проверка версий
            node -v
            npm -v
            pm2 -v || echo "PM2 not installed"

            # Установка зависимостей и билд
            npm install --production
            npm run build

            # Запуск/перезапуск через PM2
            pm2 describe $APP_NAME > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload $APP_NAME
            else
              pm2 start npm --name "$APP_NAME" -- start
            fi
            pm2 save
