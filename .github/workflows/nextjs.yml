name: Deploy 2el-front

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add GitHub to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            PROJECT_DIR=/var/www/2el-front

            # Создаем папку, если нет
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # Проверяем права
            if [ ! -w $PROJECT_DIR ]; then
              echo "Нет прав на запись в $PROJECT_DIR"
              exit 1
            fi

            # Если папка пустая, клонируем, иначе обновляем
            if [ -z "$(ls -A $PROJECT_DIR)" ]; then
              git clone git@github.com:niftaliyev/2el-front.git . || exit 1
            else
              git reset --hard
              git pull origin main
            fi

            # Проверка package.json
            if [ ! -f package.json ]; then
              echo "package.json не найден! Деплой прерван."
              exit 1
            fi

            # Node через NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20

            # Установка зависимостей и сборка
            npm install --production
            npm run build

            # Перезапуск через PM2
            pm2 describe 2el-front > /dev/null
            if [ $? -eq 0 ]; then
              pm2 reload 2el-front
            else
              pm2 start npm --name "2el-front" -- start
            fi
            pm2 save
