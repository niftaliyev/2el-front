name: Deploy 2el-front (Next.js)

on:
  push:
    branches:
      - main

env:
  APP_NAME: 2el-front
  APP_DIR: /var/www/2el-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js (опционально)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Подготовка папки на сервере (решает проблему прав)
      - name: Prepare server folder
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/2el-front
            sudo chown -R $USER:$USER /var/www/2el-front
            sudo chmod -R 755 /var/www/2el-front

      # 4. Копирование файлов
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/var/www/2el-front"
          strip_components: 1

      # 5. Деплой (КЛЮЧЕВОЙ фикс через bash -l)
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/2el-front

            bash -l -c "
              node -v
              npm -v

              npm install --production
              npm run build

              pm2 describe 2el-front > /dev/null
              if [ $? -eq 0 ]; then
                pm2 reload 2el-front
              else
                pm2 start npm --name '2el-front' -- start
              fi

              pm2 save
            "
